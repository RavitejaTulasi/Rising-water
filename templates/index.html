<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Flood Prediction</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav>

        <div class="logo">
            Floods Prediction
        </div>

        <ul>

            <li><a href="/">Home</a></li>

            <li><a href="/predict">Predict Floods</a></li>

        </ul>

    </nav>

    <!-- ================= PREDICTION FORM ================= -->

    <section class="predict-section">

        <div class="container">

            <h1>Flood Prediction</h1>

            <p class="subtitle">
                Enter the weather and rainfall information below.
            </p>

            <form action="/result" method="POST">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Temperature (°C)</label>
                        <input type="number" step="any"
                               name="Temp"
                               placeholder="Enter Temperature"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Humidity (%)</label>
                        <input type="number" step="any"
                               name="Humidity"
                               placeholder="Enter Humidity"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Cloud Cover (%)</label>
                        <input type="number" step="any"
                               name="CloudCover"
                               placeholder="Enter Cloud Cover"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Annual Rainfall (mm)</label>
                        <input type="number" step="any"
                               name="ANNUAL"
                               placeholder="Enter Annual Rainfall"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Jan-Feb Rainfall</label>
                        <input type="number" step="any"
                               name="JanFeb"
                               placeholder="Enter Jan-Feb Rainfall"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Mar-May Rainfall</label>
                        <input type="number" step="any"
                               name="MarMay"
                               placeholder="Enter Mar-May Rainfall"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Jun-Sep Rainfall</label>
                        <input type="number" step="any"
                               name="JunSep"
                               placeholder="Enter Jun-Sep Rainfall"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Oct-Dec Rainfall</label>
                        <input type="number" step="any"
                               name="OctDec"
                               placeholder="Enter Oct-Dec Rainfall"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Average June Rainfall</label>
                        <input type="number" step="any"
                               name="avgjune"
                               placeholder="Enter Average June Rainfall"
                               required>
                    </div>

                    <div class="form-group">
                        <label>Sub Rainfall</label>
                        <input type="number" step="any"
                               name="sub"
                               placeholder="Enter Sub Rainfall"
                               required>
                    </div>

                </div>

                <div class="button-box">

                    <button type="submit">

                        Predict Flood

                    </button>

                </div>

            </form>

        </div>

    </section>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
